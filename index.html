<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Operation Firewall — Aston Cyber Command</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js" crossorigin></script>
<style>
  :root {
    --paperdark: #1A0020;
    --paperdark-2: #2A0840;
    --astondeep: #610064;
    --astonpurple: #920088;
    --astonpink: #D30063;
    --astonorange: #F93E26;
    --warnred: #C8102E;
    --termgreen: #00FF66;
    --white: #FFFFFF;
    --offwhite: #F4F0F5;
    --midgrey: #B5A8BC;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--paperdark);
    background-image:
      repeating-linear-gradient(0deg, transparent 0px, transparent 2px, rgba(97, 0, 100, 0.05) 3px, transparent 4px),
      radial-gradient(ellipse at top, rgba(97, 0, 100, 0.18) 0%, transparent 55%);
    color: var(--offwhite);
    font-family: 'Inter', system-ui, sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }
  .font-display { font-family: 'Orbitron', 'Arial Black', sans-serif; letter-spacing: 0.05em; }
  .font-mono { font-family: 'JetBrains Mono', monospace; }
  .text-astondeep { color: var(--astondeep); }
  .text-astonpink { color: var(--astonpink); }
  .text-astonorange { color: var(--astonorange); }
  .text-termgreen { color: var(--termgreen); }
  .text-warnred { color: var(--warnred); }
  .text-offwhite { color: var(--offwhite); }
  .text-midgrey { color: var(--midgrey); }
  .bg-paperdark { background-color: var(--paperdark); }
  .bg-paperdark-2 { background-color: var(--paperdark-2); }
  .bg-astondeep { background-color: var(--astondeep); }
  .bg-astonpink { background-color: var(--astonpink); }
  .bg-astonorange { background-color: var(--astonorange); }
  .bg-warnred { background-color: var(--warnred); }
  .border-astondeep { border-color: var(--astondeep); }
  .border-astonpink { border-color: var(--astonpink); }
  .border-astonorange { border-color: var(--astonorange); }
  .border-termgreen { border-color: var(--termgreen); }
  .border-warnred { border-color: var(--warnred); }

  @keyframes pulseOrange { 0%,100%{box-shadow:0 0 0 0 rgba(249,62,38,0.55);} 50%{box-shadow:0 0 0 14px rgba(249,62,38,0);} }
  @keyframes glowGreen { 0%,100%{box-shadow:0 0 10px rgba(0,255,102,0.45);} 50%{box-shadow:0 0 22px rgba(0,255,102,0.85);} }
  @keyframes glowPink { 0%,100%{box-shadow:0 0 10px rgba(211,0,99,0.45);} 50%{box-shadow:0 0 22px rgba(211,0,99,0.85);} }
  @keyframes glowRed { 0%,100%{box-shadow:0 0 10px rgba(200,16,46,0.55);} 50%{box-shadow:0 0 28px rgba(200,16,46,0.95);} }
  @keyframes shake { 0%,100%{transform:translateX(0);} 20%,60%{transform:translateX(-10px);} 40%,80%{transform:translateX(10px);} }
  @keyframes slideUp { from{transform:translateY(24px);opacity:0;} to{transform:translateY(0);opacity:1;} }
  @keyframes fadeIn { from{opacity:0;} to{opacity:1;} }
  @keyframes blink { 0%,49%{opacity:1;} 50%,100%{opacity:0;} }
  @keyframes scanLine { 0%{transform:translateY(-100%);} 100%{transform:translateY(110vh);} }
  @keyframes confetti { 0%{transform:translateY(0) rotate(0);opacity:1;} 100%{transform:translateY(800px) rotate(720deg);opacity:0;} }

  .animate-pulse-orange { animation: pulseOrange 2.2s infinite; }
  .animate-glow-green { animation: glowGreen 2s infinite; }
  .animate-glow-pink { animation: glowPink 2s infinite; }
  .animate-glow-red { animation: glowRed 1.4s infinite; }
  .animate-shake { animation: shake 0.42s ease-in-out; }
  .animate-slide-up { animation: slideUp 0.42s cubic-bezier(.2,.7,.3,1.0); }
  .animate-fade-in { animation: fadeIn 0.55s ease-out; }
  .cursor-blink::after { content: '_'; animation: blink 1s infinite; margin-left: 2px; }

  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: var(--paperdark-2); }
  ::-webkit-scrollbar-thumb { background: var(--astondeep); border-radius: 5px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--astonpink); }

  .btn-primary {
    background-color: var(--astonorange); color: white; font-weight: 700; letter-spacing: 0.12em;
    text-transform: uppercase; padding: 0.85rem 1.6rem; border-radius: 4px; border: none;
    cursor: pointer; font-family: 'Orbitron', sans-serif; transition: all 0.2s;
    box-shadow: 0 2px 0 rgba(0,0,0,0.4);
  }
  .btn-primary:hover:not(:disabled) { background-color: var(--astonpink); transform: translateY(-2px); box-shadow: 0 6px 18px rgba(249,62,38,0.45); }
  .btn-primary:disabled { opacity: 0.32; cursor: not-allowed; }
  .btn-ghost {
    background: transparent; color: var(--astonorange); border: 1.5px solid var(--astonorange);
    padding: 0.55rem 1.1rem; font-family: 'Orbitron', sans-serif; text-transform: uppercase;
    letter-spacing: 0.1em; cursor: pointer; font-weight: 700; border-radius: 4px; transition: all 0.2s;
    font-size: 0.85rem;
  }
  .btn-ghost:hover:not(:disabled) { background: rgba(249,62,38,0.12); transform: translateY(-1px); }
  .btn-ghost:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-pink {
    background-color: var(--astonpink); color: white; font-weight: 700; letter-spacing: 0.12em;
    text-transform: uppercase; padding: 0.85rem 1.6rem; border-radius: 4px; border: none;
    cursor: pointer; font-family: 'Orbitron', sans-serif; transition: all 0.2s;
  }
  .btn-pink:hover:not(:disabled) { background-color: var(--astonpurple); transform: translateY(-2px); }
  .btn-pink:disabled { opacity: 0.35; cursor: not-allowed; }

  .input-cyber {
    background: rgba(26, 0, 32, 0.85); border: 1.5px solid var(--astondeep); color: var(--white);
    padding: 0.55rem 0.85rem; font-family: 'JetBrains Mono', monospace; border-radius: 4px;
    outline: none; transition: all 0.2s; font-size: 1.1rem; font-weight: 700;
  }
  .input-cyber:focus { border-color: var(--astonorange); box-shadow: 0 0 0 2px rgba(249, 62, 38, 0.25); }
  .input-cyber.correct { border-color: var(--termgreen); box-shadow: 0 0 0 2px rgba(0,255,102,0.3); }
  .input-cyber.wrong { border-color: var(--warnred); box-shadow: 0 0 0 2px rgba(200,16,46,0.3); }

  .card { background-color: var(--paperdark-2); border: 1px solid var(--astondeep); border-radius: 6px; }
  .card-orange { border-color: var(--astonorange); }
  .card-pink { border-color: var(--astonpink); }

  .badge-section {
    background-color: var(--astonorange); color: white; font-family: 'Orbitron', sans-serif;
    font-weight: 900; display: flex; align-items: center; justify-content: center;
  }

  .cipher-cell {
    display: inline-flex; align-items: center; justify-content: center;
    min-width: 2.6rem; height: 3rem; padding: 0 0.5rem; border-radius: 4px; margin: 0.18rem;
    background: rgba(0,0,0,0.65); border: 1px solid var(--termgreen); color: var(--termgreen);
    font-family: 'JetBrains Mono', monospace; font-size: 1.5rem; font-weight: 700;
  }
  .cipher-cell.space { background: transparent; border: none; min-width: 0.8rem; }

  .server-card {
    background-color: var(--paperdark-2); border: 1.5px solid var(--astondeep);
    border-radius: 6px; padding: 0.9rem; transition: all 0.2s;
  }
  .server-card.tested { border-color: var(--astonpurple); }
  .server-card.prime { border-color: var(--termgreen); animation: glowGreen 2s infinite; }
  .server-card.selected-intruder { border-color: var(--warnred); animation: glowRed 1.4s infinite; }

  .prime-btn {
    background-color: var(--astondeep); color: white; font-family: 'JetBrains Mono', monospace;
    border: 1.5px solid var(--astonpurple); border-radius: 4px; padding: 0.6rem 0.85rem;
    font-weight: 700; cursor: pointer; transition: all 0.2s; font-size: 1.05rem; min-width: 3.5rem;
  }
  .prime-btn:hover:not(:disabled) { background-color: var(--astonpurple); transform: translateY(-1px); }
  .prime-btn.correct { background-color: var(--termgreen); color: var(--paperdark); border-color: var(--termgreen); animation: glowGreen 2s infinite; }
  .prime-btn.wrong { background-color: var(--paperdark-2); color: var(--warnred); border-color: var(--warnred); opacity: 0.45; }
  .prime-btn:disabled { cursor: not-allowed; }

  .hash-row { display: grid; grid-template-columns: 3rem 4rem 3rem 5rem; align-items: center; gap: 0.5rem; padding: 0.25rem 0.5rem; border-bottom: 1px solid rgba(97,0,100,0.4); }
  .hash-row .letter { font-family: 'Orbitron'; font-weight: 700; color: var(--astonorange); font-size: 1.05rem; }
  .hash-row .formula { color: var(--midgrey); font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; }
  .hash-row .arrow { color: var(--astonorange); font-weight: 700; text-align: center; }

  .loading-screen {
    position: fixed; inset: 0; background: var(--paperdark);
    display: flex; align-items: center; justify-content: center; z-index: 9999;
    flex-direction: column; gap: 1rem;
  }
  .confetti-piece {
    position: fixed; width: 10px; height: 14px; top: -20px;
    animation: confetti 2.2s cubic-bezier(.2,.7,.3,1.0) forwards;
    pointer-events: none; z-index: 90;
  }
  .scan-line {
    position: fixed; left: 0; right: 0; height: 80px;
    background: linear-gradient(to bottom, transparent, rgba(0,255,102,0.04), transparent);
    pointer-events: none; z-index: 1;
    animation: scanLine 11s linear infinite;
  }
  @media (max-width: 640px) { .hide-mobile { display: none; } }
</style>
</head>
<body>
  <div id="root">
    <div class="loading-screen">
      <div class="font-display text-astonorange" style="font-size:2.2rem;font-weight:900;letter-spacing:0.25em;">INITIALIZING . . .</div>
      <div class="font-mono text-termgreen" style="font-size:0.9rem;">&gt; connecting to Aston Cyber Command</div>
    </div>
  </div>
  <div class="scan-line"></div>

function letterToIndex(c) {
  return c.charCodeAt(0) - 65;
}
function indexToLetter(n) {
  return String.fromCharCode((n % 26 + 26) % 26 + 65);
}
function caesarShift(text, shift) {
  return text.toUpperCase().split('').map(c => {
    if (c >= 'A' && c <= 'Z') return indexToLetter(letterToIndex(c) + shift);
    return c;
  }).join('');
}
function hashFn(c) {
  return indexToLetter((3 * letterToIndex(c) + 7) % 26);
}

  const m = Math.floor(seconds / 60);
