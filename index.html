<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Operation Firewall — Aston Cyber Command</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  :root {
    --paperdark: #1A0020;
    --paperdark-2: #2A0840;
    --astondeep: #610064;
    --astonpurple: #920088;
    --astonpink: #D30063;
    --astonorange: #F93E26;
    --warnred: #C8102E;
    --termgreen: #00FF66;
    --white: #FFFFFF;
    --offwhite: #F4F0F5;
    --midgrey: #B5A8BC;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--paperdark);
    background-image:
      repeating-linear-gradient(0deg, transparent 0px, transparent 2px, rgba(97, 0, 100, 0.05) 3px, transparent 4px),
      radial-gradient(ellipse at top, rgba(97, 0, 100, 0.18) 0%, transparent 55%);
    color: var(--offwhite);
    font-family: 'Inter', system-ui, sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }
  .font-display { font-family: 'Orbitron', 'Arial Black', sans-serif; letter-spacing: 0.05em; }
  .font-mono { font-family: 'JetBrains Mono', monospace; }
  .text-astondeep { color: var(--astondeep); }
  .text-astonpink { color: var(--astonpink); }
  .text-astonorange { color: var(--astonorange); }
  .text-termgreen { color: var(--termgreen); }
  .text-warnred { color: var(--warnred); }
  .text-offwhite { color: var(--offwhite); }
  .text-midgrey { color: var(--midgrey); }
  .bg-paperdark { background-color: var(--paperdark); }
  .bg-paperdark-2 { background-color: var(--paperdark-2); }
  .bg-astondeep { background-color: var(--astondeep); }
  .bg-astonpink { background-color: var(--astonpink); }
  .bg-astonorange { background-color: var(--astonorange); }
  .bg-warnred { background-color: var(--warnred); }
  .border-astondeep { border-color: var(--astondeep); }
  .border-astonpink { border-color: var(--astonpink); }
  .border-astonorange { border-color: var(--astonorange); }
  .border-termgreen { border-color: var(--termgreen); }
  .border-warnred { border-color: var(--warnred); }

  @keyframes pulseOrange { 0%,100%{box-shadow:0 0 0 0 rgba(249,62,38,0.55);} 50%{box-shadow:0 0 0 14px rgba(249,62,38,0);} }
  @keyframes glowGreen { 0%,100%{box-shadow:0 0 10px rgba(0,255,102,0.45);} 50%{box-shadow:0 0 22px rgba(0,255,102,0.85);} }
  @keyframes glowPink { 0%,100%{box-shadow:0 0 10px rgba(211,0,99,0.45);} 50%{box-shadow:0 0 22px rgba(211,0,99,0.85);} }
  @keyframes glowRed { 0%,100%{box-shadow:0 0 10px rgba(200,16,46,0.55);} 50%{box-shadow:0 0 28px rgba(200,16,46,0.95);} }
  @keyframes shake { 0%,100%{transform:translateX(0);} 20%,60%{transform:translateX(-10px);} 40%,80%{transform:translateX(10px);} }
  @keyframes slideUp { from{transform:translateY(24px);opacity:0;} to{transform:translateY(0);opacity:1;} }
  @keyframes fadeIn { from{opacity:0;} to{opacity:1;} }
  @keyframes blink { 0%,49%{opacity:1;} 50%,100%{opacity:0;} }
  @keyframes scanLine { 0%{transform:translateY(-100%);} 100%{transform:translateY(110vh);} }
  @keyframes confetti { 0%{transform:translateY(0) rotate(0);opacity:1;} 100%{transform:translateY(800px) rotate(720deg);opacity:0;} }

  .animate-pulse-orange { animation: pulseOrange 2.2s infinite; }
  .animate-glow-green { animation: glowGreen 2s infinite; }
  .animate-glow-pink { animation: glowPink 2s infinite; }
  .animate-glow-red { animation: glowRed 1.4s infinite; }
  .animate-shake { animation: shake 0.42s ease-in-out; }
  .animate-slide-up { animation: slideUp 0.42s cubic-bezier(.2,.7,.3,1.0); }
  .animate-fade-in { animation: fadeIn 0.55s ease-out; }
  .cursor-blink::after { content: '_'; animation: blink 1s infinite; margin-left: 2px; }

  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: var(--paperdark-2); }
  ::-webkit-scrollbar-thumb { background: var(--astondeep); border-radius: 5px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--astonpink); }

  .btn-primary {
    background-color: var(--astonorange); color: white; font-weight: 700; letter-spacing: 0.12em;
    text-transform: uppercase; padding: 0.85rem 1.6rem; border-radius: 4px; border: none;
    cursor: pointer; font-family: 'Orbitron', sans-serif; transition: all 0.2s;
    box-shadow: 0 2px 0 rgba(0,0,0,0.4);
  }
  .btn-primary:hover:not(:disabled) { background-color: var(--astonpink); transform: translateY(-2px); box-shadow: 0 6px 18px rgba(249,62,38,0.45); }
  .btn-primary:disabled { opacity: 0.32; cursor: not-allowed; }
  .btn-ghost {
    background: transparent; color: var(--astonorange); border: 1.5px solid var(--astonorange);
    padding: 0.55rem 1.1rem; font-family: 'Orbitron', sans-serif; text-transform: uppercase;
    letter-spacing: 0.1em; cursor: pointer; font-weight: 700; border-radius: 4px; transition: all 0.2s;
    font-size: 0.85rem;
  }
  .btn-ghost:hover:not(:disabled) { background: rgba(249,62,38,0.12); transform: translateY(-1px); }
  .btn-ghost:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-pink {
    background-color: var(--astonpink); color: white; font-weight: 700; letter-spacing: 0.12em;
    text-transform: uppercase; padding: 0.85rem 1.6rem; border-radius: 4px; border: none;
    cursor: pointer; font-family: 'Orbitron', sans-serif; transition: all 0.2s;
  }
  .btn-pink:hover:not(:disabled) { background-color: var(--astonpurple); transform: translateY(-2px); }
  .btn-pink:disabled { opacity: 0.35; cursor: not-allowed; }

  .input-cyber {
    background: rgba(26, 0, 32, 0.85); border: 1.5px solid var(--astondeep); color: var(--white);
    padding: 0.55rem 0.85rem; font-family: 'JetBrains Mono', monospace; border-radius: 4px;
    outline: none; transition: all 0.2s; font-size: 1.1rem; font-weight: 700;
  }
  .input-cyber:focus { border-color: var(--astonorange); box-shadow: 0 0 0 2px rgba(249, 62, 38, 0.25); }
  .input-cyber.correct { border-color: var(--termgreen); box-shadow: 0 0 0 2px rgba(0,255,102,0.3); }
  .input-cyber.wrong { border-color: var(--warnred); box-shadow: 0 0 0 2px rgba(200,16,46,0.3); }

  .card { background-color: var(--paperdark-2); border: 1px solid var(--astondeep); border-radius: 6px; }
  .card-orange { border-color: var(--astonorange); }
  .card-pink { border-color: var(--astonpink); }

  .badge-section {
    background-color: var(--astonorange); color: white; font-family: 'Orbitron', sans-serif;
    font-weight: 900; display: flex; align-items: center; justify-content: center;
  }

  .cipher-cell {
    display: inline-flex; align-items: center; justify-content: center;
    min-width: 2.6rem; height: 3rem; padding: 0 0.5rem; border-radius: 4px; margin: 0.18rem;
    background: rgba(0,0,0,0.65); border: 1px solid var(--termgreen); color: var(--termgreen);
    font-family: 'JetBrains Mono', monospace; font-size: 1.5rem; font-weight: 700;
  }
  .cipher-cell.space { background: transparent; border: none; min-width: 0.8rem; }

  .server-card {
    background-color: var(--paperdark-2); border: 1.5px solid var(--astondeep);
    border-radius: 6px; padding: 0.9rem; transition: all 0.2s;
  }
  .server-card.tested { border-color: var(--astonpurple); }
  .server-card.prime { border-color: var(--termgreen); animation: glowGreen 2s infinite; }
  .server-card.selected-intruder { border-color: var(--warnred); animation: glowRed 1.4s infinite; }

  .prime-btn {
    background-color: var(--astondeep); color: white; font-family: 'JetBrains Mono', monospace;
    border: 1.5px solid var(--astonpurple); border-radius: 4px; padding: 0.6rem 0.85rem;
    font-weight: 700; cursor: pointer; transition: all 0.2s; font-size: 1.05rem; min-width: 3.5rem;
  }
  .prime-btn:hover:not(:disabled) { background-color: var(--astonpurple); transform: translateY(-1px); }
  .prime-btn.correct { background-color: var(--termgreen); color: var(--paperdark); border-color: var(--termgreen); animation: glowGreen 2s infinite; }
  .prime-btn.wrong { background-color: var(--paperdark-2); color: var(--warnred); border-color: var(--warnred); opacity: 0.45; }
  .prime-btn:disabled { cursor: not-allowed; }

  .hash-row { display: grid; grid-template-columns: 3rem 4rem 3rem 5rem; align-items: center; gap: 0.5rem; padding: 0.25rem 0.5rem; border-bottom: 1px solid rgba(97,0,100,0.4); }
  .hash-row .letter { font-family: 'Orbitron'; font-weight: 700; color: var(--astonorange); font-size: 1.05rem; }
  .hash-row .formula { color: var(--midgrey); font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; }
  .hash-row .arrow { color: var(--astonorange); font-weight: 700; text-align: center; }

  .loading-screen {
    position: fixed; inset: 0; background: var(--paperdark);
    display: flex; align-items: center; justify-content: center; z-index: 9999;
    flex-direction: column; gap: 1rem;
  }
  .confetti-piece {
    position: fixed; width: 10px; height: 14px; top: -20px;
    animation: confetti 2.2s cubic-bezier(.2,.7,.3,1.0) forwards;
    pointer-events: none; z-index: 90;
  }
  .scan-line {
    position: fixed; left: 0; right: 0; height: 80px;
    background: linear-gradient(to bottom, transparent, rgba(0,255,102,0.04), transparent);
    pointer-events: none; z-index: 1;
    animation: scanLine 11s linear infinite;
  }
  @media (max-width: 640px) { .hide-mobile { display: none; } }
</style>
</head>
<body>
  <div id="root">
    <div class="loading-screen">
      <div class="font-display text-astonorange" style="font-size:2.2rem;font-weight:900;letter-spacing:0.25em;">INITIALIZING . . .</div>
      <div class="font-mono text-termgreen" style="font-size:0.9rem;">> connecting to Aston Cyber Command</div>
    </div>
  </div>
  <div class="scan-line"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useMemo } = React;

// === HELPERS ===
function letterToIndex(c){ return c.charCodeAt(0) - 65; }
function indexToLetter(n){ return String.fromCharCode(((n%26)+26)%26 + 65); }
function caesarShift(text, shift){
  return text.toUpperCase().split('').map(c => {
    if (c >= 'A' && c <= 'Z') return indexToLetter(letterToIndex(c) + shift);
    return c;
  }).join('');
}
function hashFn(c){ return indexToLetter((3*letterToIndex(c) + 7) % 26); }
function fmtTime(seconds){
  const m = Math.floor(seconds / 60);
  const s = seconds % 60;
  return `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
}

// === CHROME COMPONENTS ===
function ClassifiedHeader({ schoolName, teamName, elapsed }){
  return (
    <header className="w-full">
      <div className="bg-astonorange w-full">
        <div className="max-w-7xl mx-auto px-4 py-1.5 flex items-center justify-between font-display text-white text-xs sm:text-sm font-bold tracking-widest">
          <span>CLASSIFIED // ASTON CYBER COMMAND // EYES ONLY</span>
          <span className="hide-mobile font-mono">{schoolName || 'UNASSIGNED'} · {teamName || 'NO CALLSIGN'}</span>
        </div>
      </div>
      <div className="bg-paperdark-2 border-b border-astondeep w-full">
        <div className="max-w-7xl mx-auto px-4 py-2 flex items-center justify-between text-xs sm:text-sm font-mono">
          <div className="text-astonorange font-bold">OP-FW-9G · TOP SECRET</div>
          <div className="text-termgreen hide-mobile">▲ THREAT LEVEL: <span className="font-bold">SEVERE</span></div>
          <div className="text-midgrey">CLOCK <span className="text-white font-bold">{fmtTime(elapsed)}</span></div>
        </div>
      </div>
    </header>
  );
}

function ToastStack({ toasts }){
  return (
    <div className="fixed right-4 top-24 z-50 flex flex-col gap-2 max-w-sm">
      {toasts.map(t => (
        <div key={t.id} className={`animate-slide-up border-2 rounded p-3 font-mono text-sm shadow-lg ${
          t.type === 'success' ? 'border-termgreen bg-paperdark-2 text-termgreen' :
          t.type === 'error'   ? 'border-warnred bg-paperdark-2 text-warnred animate-glow-red' :
          t.type === 'info'    ? 'border-astonorange bg-paperdark-2 text-astonorange' :
                                  'border-astonpink bg-paperdark-2 text-astonpink'
        }`}>
          <div className="flex items-start gap-2">
            <span className="font-display font-bold">{t.type === 'success' ? '✓' : t.type === 'error' ? '✗' : t.type === 'info' ? 'ℹ' : '!'}</span>
            <div className="flex-1">
              {t.title && <div className="font-display font-bold tracking-wider mb-1 text-xs">{t.title}</div>}
              <div className="text-xs leading-snug">{t.message}</div>
            </div>
          </div>
        </div>
      ))}
    </div>
  );
}

function Confetti({ active, count = 32 }){
  if (!active) return null;
  const colors = ['#F93E26', '#D30063', '#920088', '#00FF66', '#FFFFFF'];
  return (
    <div className="fixed inset-0 pointer-events-none z-40">
      {Array.from({length: count}, (_, i) => {
        const left = Math.random() * 100;
        const delay = Math.random() * 0.4;
        const dur  = 1.6 + Math.random() * 1.2;
        const color = colors[i % colors.length];
        return <div key={i} className="confetti-piece" style={{ left: `${left}%`, background: color, animationDelay: `${delay}s`, animationDuration: `${dur}s` }} />;
      })}
    </div>
  );
}

function WarningModal({ open, title, body, onClose }){
  if (!open) return null;
  return (
    <div className="fixed inset-0 bg-black bg-opacity-75 z-50 flex items-center justify-center px-4 animate-fade-in">
      <div className="max-w-md w-full bg-paperdark-2 border-2 rounded p-6 animate-slide-up border-warnred animate-glow-red">
        <div className="flex items-center gap-3 mb-3">
          <span className="font-display text-3xl text-warnred">▲</span>
          <div className="font-display font-bold text-xl tracking-widest text-warnred">{title}</div>
        </div>
        <div className="text-offwhite text-sm leading-relaxed mb-5">{body}</div>
        <button className="btn-primary w-full" onClick={onClose}>ACKNOWLEDGE</button>
      </div>
    </div>
  );
}

function ReportInOverlay({ data, onContinue, schoolName }){
  if (!data) return null;
  return (
    <div className="fixed inset-0 bg-black bg-opacity-85 z-50 flex items-center justify-center px-4 py-8 overflow-auto animate-fade-in">
      <div className="max-w-2xl w-full bg-paperdark-2 border-2 border-astonorange rounded p-6 sm:p-8 animate-slide-up animate-glow-pink">
        <div className="text-center">
          <div className="text-astonorange font-display font-bold text-xs tracking-widest mb-2">▶ REPORT IN — SECTION {data.letter}</div>
          <div className="font-display font-black text-3xl sm:text-5xl text-white mb-1">SECTION COMPLETE</div>
          <div className="text-astonpink font-display tracking-widest text-sm mb-6">{data.sectionName}</div>
          <div className="bg-black border-2 border-termgreen rounded p-4 mb-4 text-left">
            <div className="text-termgreen font-mono text-xs mb-2">> RAISE YOUR HAND AND CALL OUT:</div>
            <div className="text-white font-mono text-sm sm:text-base break-words">
              "School {schoolName || '________'} — Section {data.letter} complete. {data.calloutLabel}: <span className="text-termgreen font-bold">{data.codeword}</span>"
            </div>
          </div>
          {data.realWorld && (
            <div className="bg-paperdark border-l-4 border-astonorange p-3 mb-4 text-left">
              <div className="font-display text-astonorange text-xs font-bold tracking-widest mb-1">▲ REAL WORLD</div>
              <div className="text-offwhite text-sm leading-snug">{data.realWorld}</div>
            </div>
          )}
          <button className="btn-primary text-base" onClick={onContinue}>
            {data.letter === 'E' ? 'COMPLETE MISSION ▶' : `MOVE TO SECTION ${data.next} ▶`}
          </button>
        </div>
      </div>
    </div>
  );
}

function TerminalLog({ entries, open, onToggle }){
  const scrollRef = useRef(null);
  useEffect(() => {
    if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
  }, [entries, open]);
  return (
    <div className="fixed bottom-0 left-0 right-0 z-30">
      <div className="max-w-7xl mx-auto">
        <button onClick={onToggle}
          className="w-full bg-astondeep text-white font-display font-bold tracking-widest text-xs py-1.5 px-4 flex items-center justify-between border-t-2 border-astonorange hover:bg-astonpink transition-colors">
          <span className="flex items-center gap-2"><span className="text-termgreen">●</span> MISSION CONTROL TERMINAL</span>
          <span className="font-mono">{open ? '▼ HIDE' : '▲ SHOW'} ({entries.length})</span>
        </button>
        {open && (
          <div ref={scrollRef} className="bg-black bg-opacity-95 border-t border-termgreen overflow-y-auto" style={{maxHeight:'180px'}}>
            <div className="p-3 font-mono text-xs space-y-0.5">
              {entries.length === 0 && <div className="text-midgrey">> awaiting input . . .</div>}
              {entries.map((e, i) => (
                <div key={i} className={
                  e.type === 'success' ? 'text-termgreen' :
                  e.type === 'error'   ? 'text-warnred' :
                  e.type === 'warn'    ? 'text-astonorange' :
                                          'text-offwhite'
                }>
                  <span className="text-midgrey">[{e.t}]</span> <span className="font-bold">›</span> {e.msg}
                </div>
              ))}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function HintLadder({ hints, taskId }){
  const [revealed, setRevealed] = useState(0);
  useEffect(() => { setRevealed(0); }, [taskId]);
  return (
    <div className="mt-4 border-l-4 border-astonpink pl-3">
      <div className="text-astonpink font-display font-bold tracking-widest text-xs mb-2">▶ HINT LADDER (use only if stuck)</div>
      <div className="space-y-1.5">
        {hints.map((h, i) => (
          <div key={i}>
            {i < revealed ? (
              <div className="bg-paperdark-2 border border-astondeep rounded p-2 text-sm text-offwhite animate-fade-in">
                <span className="text-astonpink font-display font-bold tracking-widest text-xs mr-2">H{i+1}:</span>{h}
              </div>
            ) : i === revealed ? (
              <button className="btn-ghost text-xs" onClick={() => setRevealed(revealed+1)}>Reveal hint {i+1} of {hints.length}</button>
            ) : null}
          </div>
        ))}
      </div>
    </div>
  );
}

// === INTRO + BRIEFING + MAP ===
function IntroScreen({ schoolName, teamName, setSchool, setTeam, onStart }){
  const canStart = schoolName.trim().length > 0 && teamName.trim().length > 0;
  return (
    <div className="max-w-3xl mx-auto px-4 py-10 animate-fade-in">
      <div className="text-center mb-8">
        <div className="text-astonorange font-display font-bold tracking-widest text-xs mb-2">CLASSIFIED // EYES ONLY</div>
        <h1 className="font-display font-black text-white" style={{fontSize:'clamp(2.5rem,8vw,5rem)',lineHeight:1}}>OPERATION</h1>
        <h1 className="font-display font-black text-astonpink" style={{fontSize:'clamp(2.5rem,8vw,5rem)',lineHeight:1}}>FIREWALL</h1>
        <div className="text-offwhite italic text-lg mt-3">The Aston Database Heist</div>
        <div className="w-32 h-px bg-astonorange mx-auto my-4"></div>
      </div>
      <div className="card p-5 mb-6">
        <div className="text-astonorange font-display font-bold tracking-widest text-xs mb-3">▲ AUTHENTICATION REQUIRED</div>
        <div className="space-y-4">
          <label className="block">
            <div className="text-astonpink font-display text-xs font-bold tracking-widest mb-1">SCHOOL NAME</div>
            <input type="text" className="input-cyber w-full" maxLength={30} placeholder="e.g. KING EDWARD VI"
                   value={schoolName} onChange={e => setSchool(e.target.value.toUpperCase())} />
          </label>
          <label className="block">
            <div className="text-astonpink font-display text-xs font-bold tracking-widest mb-1">TEAM CALLSIGN</div>
            <input type="text" className="input-cyber w-full" maxLength={20} placeholder="e.g. CIPHER WOLVES"
                   value={teamName} onChange={e => setTeam(e.target.value.toUpperCase())} />
          </label>
        </div>
      </div>
      <div className="card p-5 mb-6 font-mono text-sm">
        <div className="text-termgreen mb-2">> authenticating . . . [OK]</div>
        <div className="text-termgreen mb-2">> loading threat intel . . . [OK]</div>
        <div className="text-termgreen mb-2">> commissioning team as: <span className="text-white">{teamName || '________'}</span></div>
        <div className="text-termgreen mb-2">> assigning to: <span className="text-white">{schoolName || '________'}</span></div>
        <div className="text-astonorange cursor-blink">> awaiting authorisation</div>
      </div>
      <div className="text-center">
        <button className="btn-primary text-lg" disabled={!canStart} onClick={onStart}>▶ ENTER COMMAND CENTRE</button>
        {!canStart && <div className="text-midgrey text-xs mt-2 font-mono">Enter school name and team callsign to continue.</div>}
      </div>
    </div>
  );
}

function MissionBriefing({ onContinue }){
  return (
    <div className="max-w-5xl mx-auto px-4 py-6 animate-fade-in">
      <div className="bg-astondeep border-b-2 border-astonorange py-4 px-5 mb-4">
        <div className="font-display font-black text-white text-2xl sm:text-3xl tracking-wider">MISSION BRIEFING</div>
        <div className="text-astonorange font-mono text-xs sm:text-sm tracking-widest">CLASSIFICATION: TOP SECRET</div>
      </div>
      <div className="card card-pink p-5 mb-5 animate-slide-up">
        <div className="flex items-center gap-3 mb-3">
          <span className="font-display text-3xl text-warnred">▲</span>
          <div className="font-display font-bold text-warnred text-lg sm:text-xl tracking-widest">INCIDENT REPORT — A LIVE BREACH IS IN PROGRESS</div>

function CaesarWheel({ shift, onShiftChange, size = 280, label = 'SHIFT' }){
  const cx = size/2, cy = size/2;
  const outerR = size*0.40, innerR = size*0.27;
  const letterROuter = size*0.35, letterRInner = size*0.22;
  const angle = -shift * (360/26);
  return (
    <div className="flex flex-col items-center">
      <svg viewBox={`0 0 ${size} ${size}`} style={{width:size, height:size, maxWidth:'100%'}}>
        <defs>
          <radialGradient id="wheelBg" cx="50%" cy="50%">
            <stop offset="0%" stopColor="#2A0840" />
            <stop offset="100%" stopColor="#1A0020" />
          </radialGradient>
        </defs>
        <circle cx={cx} cy={cy} r={outerR + 6} fill="url(#wheelBg)" stroke="#610064" strokeWidth="1" />
        <circle cx={cx} cy={cy} r={outerR} fill="none" stroke="#920088" strokeWidth="2" />
        <circle cx={cx} cy={cy} r={innerR} fill="#1A0020" stroke="#F93E26" strokeWidth="2" />
        {Array.from({length:26}, (_, i) => {
          const a = (i*360/26 - 90) * Math.PI / 180;
          return <text key={'o'+i} x={cx + letterROuter*Math.cos(a)} y={cy + letterROuter*Math.sin(a)} textAnchor="middle" dominantBaseline="middle" fontSize={size*0.045} fontWeight="700" fill="#F4F0F5" fontFamily="JetBrains Mono">{indexToLetter(i)}</text>;
        })}
        <g transform={`rotate(${angle} ${cx} ${cy})`} style={{transition:'transform 0.3s cubic-bezier(.2,.7,.3,1.0)'}}>
          {Array.from({length:26}, (_, i) => {
            const a = (i*360/26 - 90) * Math.PI / 180;
            return <text key={'i'+i} x={cx + letterRInner*Math.cos(a)} y={cy + letterRInner*Math.sin(a)} textAnchor="middle" dominantBaseline="middle" fontSize={size*0.045} fontWeight="700" fill="#F93E26" fontFamily="JetBrains Mono">{indexToLetter(i)}</text>;
          })}
        </g>
        <polygon points={`${cx},${cy - outerR - 12} ${cx-9},${cy - outerR + 4} ${cx+9},${cy - outerR + 4}`} fill="#00FF66" />
      </svg>
      <div className="flex items-center gap-3 mt-2">
        <button className="btn-ghost text-base" onClick={() => onShiftChange((shift - 1 + 26)%26)}>−</button>
        <div className="text-white font-display font-bold text-base">{label} <span className="text-astonorange">{shift}</span></div>
        <button className="btn-ghost text-base" onClick={() => onShiftChange((shift + 1)%26)}>+</button>
      </div>
    </div>
  );
}

// === SECTION C ===
function SectionC({ onComplete, addLog, showToast, showWarn }){
  const [task, setTask] = useState('C1');
  const PRESET = { 0:'H', 12:'R', 25:'E' };
  const [hashAns, setHashAns] = useState(() => {
    const arr = Array(26).fill('');
    Object.entries(PRESET).forEach(([k,v]) => { arr[parseInt(k,10)] = v; });
    return arr;
  });
  const [hashCorrect, setHashCorrect] = useState(() => {
    const arr = Array(26).fill(null);
    Object.keys(PRESET).forEach(k => { arr[parseInt(k,10)] = true; });
    return arr;
  });

  function setHashCell(i, val){
    if (PRESET.hasOwnProperty(i)) return;
    const v = (val || '').toUpperCase().replace(/[^A-Z]/g,'').slice(0,1);
    const expected = hashFn(indexToLetter(i));
    const arr = hashAns.slice(); arr[i] = v; setHashAns(arr);
    const cr = hashCorrect.slice(); cr[i] = v === '' ? null : (v === expected); setHashCorrect(cr);
  }
  const c1Complete = hashCorrect.every(x => x === true);

  function checkC1(){
    if (c1Complete) {
      addLog('C1: master hash table built correctly', 'success');
      showToast({type:'success', title:'TABLE LOCKED IN', message:'You now have the master hash key for all 26 letters.'});
      setTask('C2');
    } else {
      const wrong = hashCorrect.map((c, i) => c === false ? indexToLetter(i) : null).filter(Boolean);
      const blank = hashCorrect.map((c, i) => c === null ? indexToLetter(i) : null).filter(Boolean);
      showWarn({title:'TABLE INCOMPLETE', body:
        `${wrong.length > 0 ? wrong.length + ' incorrect: ' + wrong.join(', ') + '. ' : ''}${blank.length > 0 ? blank.length + ' blank: ' + blank.join(', ') + '. ' : ''}Use h(x) = (3x + 7) mod 26.`

  const SECURE_HASH = 'JTNPGT';

    const arr = c2Cells.slice(); arr[i] = v; setC2Cells(arr);
  }
  function submitC2(){

  const CRACK_CIPHER = 'MGXIHU';

    const v = (val || '').toUpperCase().replace(/[^A-Z]/g,'').slice(0,1);
    const arr = c3Cells.slice(); arr[i] = v; setC3Cells(arr);
  }
  function submitC3(){
    const built = c3Cells.join('');
    if (built === CRACK_PLAIN) {
      setC3Done(true);
      addLog(`C3: cracked MGXIHU → TROJAN`, 'success');
      showToast({type:'success', title:'PASSWORD RECOVERED', message:'TROJAN — named after the Trojan Horse.'});
      setTimeout(() => {
        onComplete('C', 'TROJAN', {
          sectionName:'THE HASH FUNCTION', calloutLabel:'Stolen password',
          realWorld:'You worked with a function whose inverse exists because the maths is too simple. Real hashes like SHA-256 cannot be reversed — but LinkedIn used unsalted SHA-1, and within days hackers had cracked 90% of 117 million stolen passwords.'
        });
      }, 900);
    } else {
      setC3Shake(true); setTimeout(() => setC3Shake(false), 500);
      showWarn({title:'INVALID PASSWORD', body:`Work backwards: for each cipher letter, find which plain letter hashes to it in your C1 table.`});
    }
  }

  return (

        <div className="font-mono text-xl sm:text-2xl text-termgreen tracking-wider">h(x) = (3x + 7) mod 26 &nbsp;&nbsp; <span className="text-midgrey text-base">(A = 0, B = 1, ..., Z = 25)</span></div>
      </div>
      <div className="flex gap-2 mb-4">
        {[

          {id:'C3', label:'C3 · CRACK HASH', done:c3Done, unlocked:c2Done},

function SectionD({ onComplete, addLog, showToast, showWarn }){
  const [task, setTask] = useState('D1');
  const D1_TARGETS = [
    { n: 91,  primes:[7,13],  phi: 72 },
    { n: 187, primes:[11,17], phi: 160 },
    { n: 437, primes:[19,23], phi: 396 },
  ];
  const PRIME_LIST_D1 = [2, 3, 5, 7, 11, 13, 17, 19, 23];
  const [d1Selected, setD1Selected] = useState({ 91:[], 187:[], 437:[] });
  const [d1Done, setD1Done] = useState({ 91:false, 187:false, 437:false });
  const d1AllDone = Object.values(d1Done).every(Boolean);

  function clickPrimeForN(n, p){
    if (d1Done[n]) return;
    const cur = d1Selected[n].slice();
    if (cur.includes(p)) {
      const next = cur.filter(x => x !== p);
      setD1Selected({ ...d1Selected, [n]: next });
      return;
    }
    if (cur.length >= 2) {
      showWarn({title:'TWO PRIMES ONLY', body:`You already picked two primes for n=${n}. Tap one to remove it first.`});
      return;
    }
    const next = [...cur, p];
    setD1Selected({ ...d1Selected, [n]: next });
    if (next.length === 2) {
      const product = next[0] * next[1];
      if (product === n) {
        setD1Done({ ...d1Done, [n]:true });
        const phi = (next[0]-1)*(next[1]-1);
        addLog(`D1: ${n} = ${next[0]} × ${next[1]} ✓ (φ = ${phi})`, 'success');
        showToast({type:'success', title:`${n} CRACKED`, message:`${n} = ${next[0]} × ${next[1]}, φ = ${phi}.`});
      } else {
        showWarn({title:'WRONG PAIR', body:`${next[0]} × ${next[1]} = ${product}, not ${n}. Tap a prime to deselect and try again.`});
      }
    }
  }

  const D3_N = 1517;

  const D3_TRUE = [37, 41];

    if (isFactor) {
      const found = Array.from(new Set([...d3FoundFactors, p, q]));
      setD3FoundFactors(found);
      addLog(`D3: ${D3_N} ÷ ${p} = ${q} — factor found`, 'success');
      showToast({type:'success', title:'FACTOR FOUND', message:`${D3_N} = ${p} × ${q}.`});

      addLog(`D3: ${D3_N} ÷ ${p} = ${q.toFixed(2)} — not a factor`, 'info');

      setTimeout(() => {
        onComplete('D', `1517 = 37 × 41, φ = 1440`, {
          sectionName:'THE PRIME VAULT', calloutLabel:'Master key',
          realWorld:"You attacked RSA — invented in 1977 by Rivest, Shamir and Adleman. RSA secures HTTPS, online banking, and every encrypted email. Its strength is the difficulty of factoring huge semi-primes."
        });
      }, 900);
    } else {
      showWarn({title:'WRONG TOTIENT', body:`φ(n) = (p − 1)(q − 1). You have p = 37, q = 41. Compute (37 − 1)(41 − 1).`});

            className={`flex-1 px-3 py-2 rounded border-2 font-display font-bold tracking-widest text-xs sm:text-sm transition-all ${
              t.done ? 'border-termgreen text-termgreen bg-paperdark-2' :
              task === t.id ? 'border-astonorange bg-astondeep text-white' :
              !t.unlocked ? 'border-astondeep text-midgrey opacity-50 cursor-not-allowed bg-paperdark-2' :
              'border-astonpink text-astonpink bg-paperdark-2 hover:bg-astondeep'
            }`}>
            {t.done ? '✓ ' : !t.unlocked ? '🔒 ' : ''}{t.label}
          </button>
        ))}
      </div>

      {task === 'D1' && (

            <p>For n = 437 you tested 2, 3, 5, 7, 11, 13, 17 — then 19. That's <strong className="text-astonorange">8 trial divisions</strong> for an 8-bit number.</p>
            <p>How many trial divisions would be needed for the <strong className="text-astonpink">617-decimal-digit numbers</strong> that protect your bank?</p>

        </div>
      )}

      {task === 'D3' && (
        <div className="card p-5 animate-fade-in">
          <div className="text-astonorange font-display font-bold tracking-widest text-xs mb-2">TASK D3 · THE BOSS KEY (~6 MIN)</div>
          <div className="text-white text-sm mb-3">The Aston database master key uses modulus:</div>
          <div className="text-center mb-3">
            <div className="inline-block bg-black border-2 border-termgreen rounded px-6 py-2 font-mono text-3xl text-termgreen">n = {D3_N}</div>

          <div className="mb-4">

              {D3_PRIMES.map(p => {

}

// === SECTION E ===
function SectionE({ onComplete, addLog, showToast, showWarn }){
  const [task, setTask] = useState('E1');
  const E1_CIPHER = ['M','O','R','C','Z',' ','K','O',' ','O','M','B','Y'];
  const E1_STAGE1 = ['H','J','M','X','U',' ','F','J',' ','J','H','W','T'];
  const E1_STAGE2 = ['A','S','T','O','N',' ','I','S',' ','S','A','F','E'];
  const [stage1, setStage1] = useState(E1_CIPHER.map(c => c === ' ' ? ' ' : ''));
  const [stage2, setStage2] = useState(E1_CIPHER.map(c => c === ' ' ? ' ' : ''));
  const [stage1Done, setStage1Done] = useState(false);
  const [stage2Done, setStage2Done] = useState(false);
  const [stage1Shake, setStage1Shake] = useState(false);
  const [stage2Shake, setStage2Shake] = useState(false);

  function setCell(stage, i, val){
    const v = (val||'').toUpperCase().replace(/[^A-Z]/g,'').slice(0,1);
    if (stage === 1) { const a = stage1.slice(); a[i] = v; setStage1(a); }
    else { const a = stage2.slice(); a[i] = v; setStage2(a); }
  }
  function submitStage1(){
    const ok = stage1.every((c, i) => c === E1_STAGE1[i]);
    if (ok) {
      setStage1Done(true);
      addLog('E1 stage 1: Caesar reversed → HJMXU FJ JHWT', 'success');
      showToast({type:'success', title:'CAESAR PEELED', message:'First layer removed. Now reverse the hash.'});
    } else {
      setStage1Shake(true); setTimeout(() => setStage1Shake(false), 500);
      showWarn({title:'STAGE 1 FAILED', body:'Shift each cipher letter back by 5. M(12)−5=7→H. O(14)−5=9→J. Try again.'});
    }
  }
  function submitStage2(){
    const ok = stage2.every((c, i) => c === E1_STAGE2[i]);
    if (ok) {
      setStage2Done(true);
      addLog('E1 stage 2: hash reversed → ASTON IS SAFE', 'success');
      showToast({type:'success', title:'SYSTEM RESTORED', message:'Decoded: ASTON IS SAFE.'});
    } else {
      setStage2Shake(true); setTimeout(() => setStage2Shake(false), 500);
      showWarn({title:'STAGE 2 FAILED', body:'Use the inverse hash from Section C. h⁻¹(y) = 9(y−7) mod 26. Or look up which plain letter h(x) sends to it.'});
    }
  }

  const [e2Cipher, setE2Cipher] = useState('');
  const [e2Submitted, setE2Submitted] = useState(false);

  function submitE2(){
    if (e2Cipher.trim().length < 20) {
      showWarn({title:'BRIEFING TOO SHORT', body:'Describe your post-quantum cipher in at least 20 characters. There are no wrong answers — just sketch your idea.'});
      return;
    }
    setE2Submitted(true);
    addLog(`E2: design submitted (${e2Cipher.trim().length} chars)`, 'success');
    showToast({type:'success', title:'DESIGN LOGGED', message:'Your post-quantum design has been recorded with Aston Cyber Command.'});
    setTimeout(() => {
      onComplete('E', 'ASTON IS SAFE', {
        sectionName:'THE QUANTUM GAUNTLET', calloutLabel:'Final broadcast',
        realWorld:"You confronted the quantum threat. NIST has finalised the first wave of post-quantum standards (CRYSTALS-Kyber, CRYSTALS-Dilithium). They rely on lattice problems — exactly the kind of weirder maths your design considered. This is active research at universities right now, including Aston."
      });
    }, 1000);
  }

  return (
    <div className="max-w-7xl mx-auto px-4 pb-6">
      <div className="flex gap-2 mb-4">
        {[
          {id:'E1', label:'E1 · COMPOSITE DECODE', done:stage1Done && stage2Done, unlocked:true},
          {id:'E2', label:'E2 · POST-QUANTUM DESIGN', done:e2Submitted, unlocked:stage1Done && stage2Done},
        ].map(t => (
          <button key={t.id} disabled={!t.unlocked} onClick={() => setTask(t.id)}
            className={`flex-1 px-3 py-2 rounded border-2 font-display font-bold tracking-widest text-xs sm:text-sm transition-all ${
              t.done ? 'border-termgreen text-termgreen bg-paperdark-2' :
              task === t.id ? 'border-astonorange bg-astondeep text-white' :
              !t.unlocked ? 'border-astondeep text-midgrey opacity-50 cursor-not-allowed bg-paperdark-2' :
              'border-astonpink text-astonpink bg-paperdark-2 hover:bg-astondeep'
            }`}>
            {t.done ? '✓ ' : !t.unlocked ? '🔒 ' : ''}{t.label}
          </button>
        ))}
      </div>

      {task === 'E1' && (
        <div className="card p-5 animate-fade-in">
          <div className="text-astonorange font-display font-bold tracking-widest text-xs mb-2">TASK E1 · COMPOSITE DECODE (~5 MIN)</div>
          <div className="text-white text-sm mb-3">
            The Syndicate's final broadcast uses <strong>two layers</strong>: their hash from Section C, <em>then</em> a Caesar shift of +5. <strong className="text-astonorange">Undo both — in reverse order.</strong>
          </div>
          <div className="bg-black border-2 border-termgreen rounded p-3 mb-4">
            <div className="text-termgreen font-mono text-xs mb-2">▶ CIPHERTEXT</div>
            <div className="flex flex-wrap">
              {E1_CIPHER.map((c, i) => c === ' ' ? <div key={i} className="cipher-cell space"></div> : <div key={i} className="cipher-cell">{c}</div>)}
            </div>
          </div>
          <div className="mb-4">
            <div className="text-astonpink font-display font-bold tracking-widest text-xs mb-2">STEP 1 · REVERSE CAESAR (shift back by 5)</div>
            <div className={`flex flex-wrap ${stage1Shake ? 'animate-shake' : ''}`}>
              {E1_CIPHER.map((c, i) => c === ' '
                ? <div key={i} className="cipher-cell space"></div>
                : <input key={i} type="text" maxLength={1} className="cipher-cell" value={stage1[i]} disabled={stage1Done} onChange={e => setCell(1, i, e.target.value)}
                         style={{background:stage1[i] === E1_STAGE1[i] ? 'rgba(0,255,102,0.15)' : 'rgba(0,0,0,0.65)', color:'white', borderColor: stage1[i] ? (stage1[i] === E1_STAGE1[i] ? 'var(--termgreen)' : 'var(--warnred)') : 'var(--astonorange)'}} />
              )}
            </div>
            <div className="mt-2 flex gap-2">
              <button className="btn-primary" disabled={stage1Done} onClick={submitStage1}>{stage1Done ? '✓ STAGE 1 OK' : 'CHECK STAGE 1'}</button>
              {!stage1Done && <button className="btn-ghost" onClick={() => setStage1(E1_CIPHER.map(c => c === ' ' ? ' ' : ''))}>RESET</button>}
            </div>
          </div>
          {stage1Done && (
            <div className="animate-slide-up mb-4">
              <div className="text-astonpink font-display font-bold tracking-widest text-xs mb-2">STEP 2 · REVERSE THE HASH (use your inverse hash from Section C)</div>
              <div className={`flex flex-wrap ${stage2Shake ? 'animate-shake' : ''}`}>
                {E1_STAGE1.map((c, i) => c === ' '
                  ? <div key={i} className="cipher-cell space"></div>
                  : <input key={i} type="text" maxLength={1} className="cipher-cell" value={stage2[i]} disabled={stage2Done} onChange={e => setCell(2, i, e.target.value)}
                           style={{background:stage2[i] === E1_STAGE2[i] ? 'rgba(0,255,102,0.15)' : 'rgba(0,0,0,0.65)', color:'white', borderColor: stage2[i] ? (stage2[i] === E1_STAGE2[i] ? 'var(--termgreen)' : 'var(--warnred)') : 'var(--astonorange)'}} />
                )}
              </div>
              <div className="mt-2 flex gap-2">
                <button className="btn-primary" disabled={stage2Done} onClick={submitStage2}>{stage2Done ? '✓ DECODED' : 'CHECK STAGE 2'}</button>
                {!stage2Done && <button className="btn-ghost" onClick={() => setStage2(E1_CIPHER.map(c => c === ' ' ? ' ' : ''))}>RESET</button>}
                {stage2Done && <button className="btn-pink" onClick={() => setTask('E2')}>NEXT: E2 ▶</button>}
              </div>
              {stage2Done && (
                <div className="mt-3 bg-paperdark border-2 border-termgreen rounded p-3 animate-slide-up">
                  <div className="text-termgreen font-mono text-xs mb-1">> FINAL BROADCAST</div>
                  <div className="font-display font-black text-white text-2xl tracking-wider">ASTON IS SAFE.</div>
                </div>
              )}
            </div>
          )}
          <HintLadder taskId="E1" hints={[
            "Reverse Caesar +5 means shift each letter back 5. M(12)−5=7→H. O(14)−5=9→J.",
            "For Step 2, use your inverse hash. H came from A (h(A)=H). J came from S. M came from T.",
            "Stage 1: HJMXU FJ JHWT. Stage 2: ASTON IS SAFE."
          ]} />
        </div>
      )}

      {task === 'E2' && (
        <div className="card p-5 animate-fade-in">
          <div className="text-astonorange font-display font-bold tracking-widest text-xs mb-2">TASK E2 · POST-QUANTUM DESIGN (~5 MIN)</div>
          <div className="text-warnred font-display font-bold tracking-widest text-xs mb-3">⚠ NO TEAM IS EXPECTED TO FINISH</div>
          <div className="text-white text-sm mb-3 space-y-2">
            <p>RSA falls to Shor's algorithm because factoring becomes <em>easy</em> on a quantum computer. <strong className="text-astonorange">Design a cipher you believe could resist a quantum attack.</strong></p>
          </div>
          <div className="bg-paperdark-2 border-l-4 border-astonpink p-3 mb-3">
            <div className="text-astonpink font-display font-bold tracking-widest text-xs mb-1">CONSIDER:</div>
            <ul className="text-offwhite text-sm space-y-1 list-disc pl-5">
              <li><strong className="text-white">One-time pad:</strong> random key, XOR, provably unbreakable. So why doesn't the world use it?</li>
              <li><strong className="text-white">Lattice problems:</strong> find the shortest vector in a grid — believed hard for any computer (the basis of CRYSTALS-Kyber).</li>
              <li><strong className="text-white">Hash chains & Merkle trees:</strong> build security from repeated hashing.</li>
            </ul>
          </div>
          <textarea className="input-cyber w-full" rows={6} placeholder="DESCRIBE YOUR CIPHER: how does it work? Why is it quantum-resistant? What's a weakness?"
                    value={e2Cipher} disabled={e2Submitted} onChange={e => setE2Cipher(e.target.value)} />
          <div className="mt-3 flex flex-wrap gap-3 items-center">
            <button className="btn-primary" disabled={e2Submitted} onClick={submitE2}>{e2Submitted ? '✓ DESIGN SUBMITTED' : 'SUBMIT DESIGN'}</button>
            <div className="text-midgrey font-mono text-xs">{e2Cipher.trim().length} characters (min 20)</div>
          </div>
        </div>
      )}
    </div>
  );
}

// === MAIN APP ===
function App(){
  const [view, setView]   = useState('intro');
  const [school, setSchool] = useState('');
  const [team, setTeam]   = useState('');
  const [progress, setProgress] = useState({A:false,B:false,C:false,D:false,E:false});
  const [codewords, setCodewords] = useState({A:null,B:null,C:null,D:null,E:null});
  const [log, setLog] = useState([]);
  const [logOpen, setLogOpen] = useState(false);
  const [toasts, setToasts] = useState([]);
  const [warning, setWarning] = useState(null);
  const [reportIn, setReportIn] = useState(null);
  const [confetti, setConfetti] = useState(false);
  const [startTime, setStartTime] = useState(null);
  const [completionTime, setCompletionTime] = useState(null);
  const [elapsed, setElapsed] = useState(0);
  const nextId = useRef(1);

  // tick the timer
  useEffect(() => {
    if (!startTime || completionTime) return;
    const t = setInterval(() => setElapsed(Math.floor((Date.now() - startTime)/1000)), 1000);
    return () => clearInterval(t);
  }, [startTime, completionTime]);

  function addLog(msg, type='info'){
    const t = new Date().toLocaleTimeString('en-GB', {hour12:false});
    setLog(prev => [...prev, {t, msg, type}].slice(-100));
  }
  function showToast(opts){
    const id = nextId.current++;
    setToasts(prev => [...prev, {id, ...opts}]);
    const ttl = opts.type === 'error' ? 5000 : 3200;
    setTimeout(() => setToasts(prev => prev.filter(x => x.id !== id)), ttl);
  }
  function showWarn(opts){ setWarning(opts); addLog(`⚠ ${opts.title}`, 'warn'); }

  function startMission(){
    addLog('Operative authenticated. Entering Command Centre.', 'system');
    setStartTime(Date.now());
    setView('briefing');
  }

  function completeSection(letter, codeword, meta){
    setCodewords(prev => ({ ...prev, [letter]: codeword }));
    setProgress(prev => ({ ...prev, [letter]: true }));
    setConfetti(true);
    setTimeout(() => setConfetti(false), 2600);
    const next = letter === 'A' ? 'B' : letter === 'B' ? 'C' : letter === 'C' ? 'D' : letter === 'D' ? 'E' : null;
    setReportIn({ letter, codeword, next, ...meta });
    addLog(`▶ SECTION ${letter} COMPLETE. Reporting: ${codeword}`, 'success');
  }

  function dismissReportIn(){
    const letter = reportIn?.letter;
    setReportIn(null);
    if (letter === 'E') {
      setCompletionTime(Date.now());
      setView('complete');
      addLog('🎉 MISSION COMPLETE. All five layers breached. Aston is safe.', 'success');
    } else {
      setView('map');
    }
  }

  function restart(){
    setView('intro');
    setSchool(''); setTeam('');
    setProgress({A:false,B:false,C:false,D:false,E:false});
    setCodewords({A:null,B:null,C:null,D:null,E:null});
    setLog([]); setToasts([]); setWarning(null); setReportIn(null);
    setStartTime(null); setCompletionTime(null); setElapsed(0);
  }

  return (
    <div className="min-h-screen pb-24">
      {(view !== 'intro') && <ClassifiedHeader schoolName={school} teamName={team} elapsed={elapsed} />}

      {view === 'intro'    && <IntroScreen schoolName={school} teamName={team} setSchool={setSchool} setTeam={setTeam} onStart={startMission} />}
      {view === 'briefing' && <MissionBriefing onContinue={() => setView('map')} />}
      {view === 'map'      && <SectionMap progress={progress} codewords={codewords} schoolName={school} teamName={team} onEnter={(id) => id === 'complete' ? setView('complete') : setView('section' + id)} />}
      {view === 'sectionA' && (<><div className="max-w-7xl mx-auto px-4 pt-4 flex items-center justify-between"><div className="font-display font-bold text-astonpink tracking-widest text-sm">SECTION A · AUTHENTICATION LAYER</div><button className="btn-ghost text-xs" onClick={() => setView('map')}>◀ MAP</button></div><SectionA onComplete={completeSection} addLog={addLog} showToast={showToast} showWarn={showWarn} /></>)}
      {view === 'sectionB' && (<><div className="max-w-7xl mx-auto px-4 pt-4 flex items-center justify-between"><div className="font-display font-bold text-astonpink tracking-widest text-sm">SECTION B · THE FIREWALL</div><button className="btn-ghost text-xs" onClick={() => setView('map')}>◀ MAP</button></div><SectionB onComplete={completeSection} addLog={addLog} showToast={showToast} showWarn={showWarn} /></>)}
      {view === 'sectionC' && (<><div className="max-w-7xl mx-auto px-4 pt-4 flex items-center justify-between"><div className="font-display font-bold text-astonpink tracking-widest text-sm">SECTION C · THE HASH FUNCTION</div><button className="btn-ghost text-xs" onClick={() => setView('map')}>◀ MAP</button></div><SectionC onComplete={completeSection} addLog={addLog} showToast={showToast} showWarn={showWarn} /></>)}
      {view === 'sectionD' && (<><div className="max-w-7xl mx-auto px-4 pt-4 flex items-center justify-between"><div className="font-display font-bold text-astonpink tracking-widest text-sm">SECTION D · THE PRIME VAULT</div><button className="btn-ghost text-xs" onClick={() => setView('map')}>◀ MAP</button></div><SectionD onComplete={completeSection} addLog={addLog} showToast={showToast} showWarn={showWarn} /></>)}
      {view === 'sectionE' && (<><div className="max-w-7xl mx-auto px-4 pt-4 flex items-center justify-between"><div className="font-display font-bold text-astonpink tracking-widest text-sm">SECTION E · THE QUANTUM GAUNTLET</div><button className="btn-ghost text-xs" onClick={() => setView('map')}>◀ MAP</button></div><SectionE onComplete={completeSection} addLog={addLog} showToast={showToast} showWarn={showWarn} /></>)}
      {view === 'complete' && <CompletionScreen elapsed={completionTime ? Math.floor((completionTime - startTime)/1000) : elapsed} codewords={codewords} schoolName={school} teamName={team} onRestart={restart} />}

      <ToastStack toasts={toasts} />
      <Confetti active={confetti} />
      <WarningModal open={!!warning} title={warning?.title} body={warning?.body} onClose={() => setWarning(null)} />
      <ReportInOverlay data={reportIn} onContinue={dismissReportIn} schoolName={school} />
      <TerminalLog entries={log} open={logOpen} onToggle={() => setLogOpen(!logOpen)} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
